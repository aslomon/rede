name: BlitztextMac
options:
  bundleIdPrefix: app.rede
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ONLY_ACTIVE_ARCH: NO
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    # SPARKLE_ENABLED gates all updater code; a Mac App Store variant builds without it
    # (stores forbid self-updating apps). DEBUG must stay explicit for the Debug config.
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG SPARKLE_ENABLED"
    Release:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "SPARKLE_ENABLED"

packages:
  ArgmaxOSS:
    url: https://github.com/argmaxinc/argmax-oss-swift.git
    exactVersion: 0.18.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.9.3

targets:
  BlitztextMac:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Features
      - path: Services
      - path: Views
      - path: Resources
        buildPhase: resources
        excludes:
          - AppIcon.icns
          - Info.plist
          - BlitztextMac.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.rede.mac
        PRODUCT_NAME: rede
        PRODUCT_MODULE_NAME: Blitztext
        INFOPLIST_FILE: Resources/Info.plist
        INFOPLIST_KEY_CFBundleShortVersionString: $(MARKETING_VERSION)
        INFOPLIST_KEY_CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CODE_SIGN_ENTITLEMENTS: Resources/BlitztextMac.entitlements
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: ArgmaxOSS
        product: WhisperKit
      - package: Sparkle
        product: Sparkle
    entitlements:
      path: Resources/BlitztextMac.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true

  BlitztextMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: BlitztextMac
        embed: false
        link: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.rede.mac.tests
        GENERATE_INFOPLIST_FILE: true
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        # The app target overrides PRODUCT_NAME to "rede", so the bundle is
        # rede.app with binary .../MacOS/rede. XcodeGen's auto-wired
        # TEST_HOST/BUNDLE_LOADER use the target name (BlitztextMac) and miss this,
        # so we point them at the real product name explicitly.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/rede.app/Contents/MacOS/rede"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  BlitztextMac:
    build:
      targets:
        BlitztextMac: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - BlitztextMacTests
